<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVPX — Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#050508; color:#e0e0e0; font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,0,51,0.006) 3px,rgba(255,0,51,0.006) 6px); pointer-events:none; z-index:9999; }
        .login-box { background:rgba(10,10,18,0.95); backdrop-filter:blur(20px); border:1px solid rgba(255,0,51,0.12); border-radius:8px; padding:3rem 2.5rem; max-width:420px; width:100%; position:relative; z-index:1; }
        .login-box::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg,transparent,#ff0033,transparent); }
        .inp { background:#050508; border:1px solid #2e1a1a; color:#e0e0e0; font-family:'JetBrains Mono',monospace; font-size:0.85rem; padding:0.75rem 1rem; width:100%; border-radius:4px; outline:none; transition:all 0.3s; }
        .inp:focus { border-color:#ff0033; box-shadow:0 0 15px rgba(255,0,51,0.08); }
        .btn-a { background:#ff0033; border:none; color:#fff; font-family:'JetBrains Mono',monospace; font-size:0.82rem; font-weight:600; letter-spacing:1px; padding:0.75rem; width:100%; border-radius:4px; cursor:pointer; transition:all 0.3s; }
        .btn-a:hover { background:#cc0029; box-shadow:0 0 30px rgba(255,0,51,0.25); }
        .msg-err { background:rgba(255,0,51,0.1); border:1px solid rgba(255,0,51,0.2); color:#ff0033; font-family:'JetBrains Mono',monospace; font-size:0.72rem; padding:0.65rem 1rem; border-radius:4px; }
        .msg-ok { background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.2); color:#00ff88; font-family:'JetBrains Mono',monospace; font-size:0.72rem; padding:0.65rem 1rem; border-radius:4px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="text-center mb-4">
            <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:2rem;color:#ff0033;text-shadow:0 0 20px rgba(255,0,51,0.25);">SVPX</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#444466;margin-top:5px;">// ADMIN ACCESS //</div>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="{{ 'msg-ok' if cat == 'success' else 'msg-err' }} mb-3">{{ '>' if cat == 'success' else '!' }} {{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-3">
                <label style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#444466;letter-spacing:1px;display:block;margin-bottom:0.4rem;">USERNAME</label>
                <input type="text" name="username" class="inp" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#444466;letter-spacing:1px;display:block;margin-bottom:0.4rem;">PASSWORD</label>
                <input type="password" name="password" class="inp" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-a">[ AUTHENTICATE ]</button>
        </form>
        <div class="text-center mt-4">
            <a href="{{ url_for('index') }}" style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#444466;text-decoration:none;transition:color 0.3s;" onmouseover="this.style.color='#ff0033';" onmouseout="this.style.color='#444466';">← Back to site</a>
        </div>
    </div>
</body>
</html>

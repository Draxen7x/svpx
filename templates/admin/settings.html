<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVPX — Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#050508; --bg2:#0a0a12; --side:#08080f; --blue:#ff0033; --text:#e0e0e0; --muted:#553344; --border:#2e1a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,0,51,0.006) 3px,rgba(255,0,51,0.006) 6px); pointer-events:none; z-index:9999; }
        .sidebar { position:fixed; top:0; left:0; width:240px; height:100vh; background:var(--side); border-right:1px solid var(--border); z-index:1000; }
        .sidebar-h { padding:1.5rem; border-bottom:1px solid var(--border); text-align:center; }
        .sidebar-h .brand { font-family:'Orbitron',monospace; font-weight:900; font-size:1.1rem; color:var(--blue); }
        .sidebar-nav a { display:flex; align-items:center; gap:0.7rem; padding:0.7rem 1.5rem; color:var(--muted); text-decoration:none; font-family:'JetBrains Mono',monospace; font-size:0.78rem; transition:all 0.3s; border-left:3px solid transparent; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color:var(--blue); background:rgba(255,0,51,0.04); border-left-color:var(--blue); }
        .main { margin-left:240px; padding:2rem; position:relative; z-index:1; }
        .card-c { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:1.5rem; max-width:550px; }
        .cyber-inp { background:#050508; border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem; padding:0.55rem 1rem; width:100%; border-radius:4px; outline:none; transition:all 0.3s; }
        .cyber-inp:focus { border-color:var(--blue); }
        .btn-a { background:var(--blue); color:#fff; border:none; font-family:'JetBrains Mono',monospace; font-size:0.72rem; padding:0.55rem 1.2rem; border-radius:4px; cursor:pointer; transition:all 0.3s; text-decoration:none; }
        .btn-a:hover { box-shadow:0 0 20px rgba(255,0,51,0.25); color:#fff; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:rgba(255,0,51,0.3); border-radius:3px; }
        @media (max-width:768px) { .sidebar { width:100%; height:auto; position:relative; } .main { margin-left:0; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-h"><div class="brand">SVPX</div><div style="font-size:0.55rem;color:var(--muted);font-family:'JetBrains Mono',monospace;">// ADMIN //</div></div>
        <div class="sidebar-nav">
            <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="{{ url_for('admin_downloads') }}"><i class="fas fa-download"></i> Downloads</a>
            <a href="{{ url_for('admin_news') }}"><i class="fas fa-newspaper"></i> News</a>
            <a href="{{ url_for('admin_categories') }}"><i class="fas fa-tags"></i> Categories</a>
            <a href="{{ url_for('admin_settings') }}" class="active"><i class="fas fa-cog"></i> Settings</a>
            <hr style="border-color:var(--border);margin:1rem 1.5rem;">
            <a href="{{ url_for('index') }}"><i class="fas fa-external-link-alt"></i> View Site</a>
            <a href="{{ url_for('admin_logout') }}" style="color:#ff3355;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main">
        <h1 style="font-family:'Orbitron',monospace;font-weight:700;font-size:1.3rem;margin-bottom:1.5rem;">Settings</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div style="background:{% if cat == 'success' %}rgba(0,255,136,0.1){% else %}rgba(255,0,51,0.1){% endif %};border:1px solid {% if cat == 'success' %}rgba(0,255,136,0.2){% else %}rgba(255,0,51,0.2){% endif %};color:{% if cat == 'success' %}#00ff88{% else %}#ff0033{% endif %};font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:0.6rem 1rem;border-radius:4px;margin-bottom:1rem;">
                {{ '>' if cat == 'success' else '!' }} {{ msg }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="card-c">
            <form method="POST" action="{{ url_for('admin_settings') }}">
                <div class="mb-3">
                    <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">SITE NAME</label>
                    <input type="text" name="site_name" class="cyber-inp" value="{{ get_setting('site_name') or 'SVPX Community' }}">
                </div>
                <div class="mb-3">
                    <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">SERVER NAME</label>
                    <input type="text" name="server_name" class="cyber-inp" value="{{ get_setting('server_name') or '' }}">
                </div>
                <div class="mb-3">
                    <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">SERVER IP (host:port)</label>
                    <input type="text" name="server_ip" class="cyber-inp" value="{{ get_setting('server_ip') or '' }}">
                </div>
                <div class="mb-3">
                    <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">MAX PLAYERS</label>
                    <input type="number" name="max_players" class="cyber-inp" value="{{ get_setting('max_players') or '500' }}">
                </div>
                <div class="mb-3">
                    <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">DISCORD LINK</label>
                    <input type="url" name="discord_link" class="cyber-inp" value="{{ get_setting('discord_link') or '' }}">
                </div>
                <div class="mb-4">
                    <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">SITE DESCRIPTION</label>
                    <textarea name="description" class="cyber-inp" rows="2" style="resize:vertical;">{{ get_setting('description') or '' }}</textarea>
                </div>
                <button type="submit" class="btn-a"><i class="fas fa-save"></i> Save Settings</button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVPX — Edit Download</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#050508; --bg2:#0a0a12; --side:#08080f; --blue:#ff0033; --text:#e0e0e0; --muted:#553344; --border:#2e1a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,0,51,0.006) 3px,rgba(255,0,51,0.006) 6px); pointer-events:none; z-index:9999; }
        .sidebar { position:fixed; top:0; left:0; width:240px; height:100vh; background:var(--side); border-right:1px solid var(--border); z-index:1000; }
        .sidebar-h { padding:1.5rem; border-bottom:1px solid var(--border); text-align:center; }
        .sidebar-h .brand { font-family:'Orbitron',monospace; font-weight:900; font-size:1.1rem; color:var(--blue); }
        .sidebar-nav a { display:flex; align-items:center; gap:0.7rem; padding:0.7rem 1.5rem; color:var(--muted); text-decoration:none; font-family:'JetBrains Mono',monospace; font-size:0.78rem; transition:all 0.3s; border-left:3px solid transparent; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color:var(--blue); background:rgba(255,0,51,0.04); border-left-color:var(--blue); }
        .main { margin-left:240px; padding:2rem; position:relative; z-index:1; }
        .card-c { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:1.5rem; max-width:650px; }
        .cyber-inp { background:#050508; border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem; padding:0.55rem 1rem; width:100%; border-radius:4px; outline:none; transition:all 0.3s; }
        .cyber-inp:focus { border-color:var(--blue); }
        .cyber-sel { background:#050508; border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem; padding:0.55rem 1rem; width:100%; border-radius:4px; outline:none; }
        .btn-a { background:var(--blue); color:#fff; border:none; font-family:'JetBrains Mono',monospace; font-size:0.72rem; padding:0.55rem 1.2rem; border-radius:4px; cursor:pointer; transition:all 0.3s; text-decoration:none; }
        .btn-a:hover { box-shadow:0 0 20px rgba(255,0,51,0.25); color:#fff; }
        .btn-ao { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.72rem; padding:0.55rem 1.2rem; border-radius:4px; cursor:pointer; transition:all 0.3s; text-decoration:none; }
        .btn-ao:hover { border-color:var(--muted); color:var(--text); }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:rgba(255,0,51,0.3); border-radius:3px; }
        @media (max-width:768px) { .sidebar { width:100%; height:auto; position:relative; } .main { margin-left:0; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-h"><div class="brand">SVPX</div><div style="font-size:0.55rem;color:var(--muted);font-family:'JetBrains Mono',monospace;">// ADMIN //</div></div>
        <div class="sidebar-nav">
            <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="{{ url_for('admin_downloads') }}" class="active"><i class="fas fa-download"></i> Downloads</a>
            <a href="{{ url_for('admin_news') }}"><i class="fas fa-newspaper"></i> News</a>
            <a href="{{ url_for('admin_categories') }}"><i class="fas fa-tags"></i> Categories</a>
            <a href="{{ url_for('admin_settings') }}"><i class="fas fa-cog"></i> Settings</a>
            <hr style="border-color:var(--border);margin:1rem 1.5rem;">
            <a href="{{ url_for('index') }}"><i class="fas fa-external-link-alt"></i> View Site</a>
            <a href="{{ url_for('admin_logout') }}" style="color:#ff3355;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{{ url_for('admin_downloads') }}" class="btn-ao"><i class="fas fa-arrow-left"></i></a>
            <h1 style="font-family:'Orbitron',monospace;font-weight:700;font-size:1.2rem;">Edit Download</h1>
        </div>

        <div class="card-c">
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">TITLE</label>
                        <input type="text" name="title" class="cyber-inp" value="{{ item.title }}" required>
                    </div>
                    <div class="col-md-4">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">VERSION</label>
                        <input type="text" name="version" class="cyber-inp" value="{{ item.version or '1.0' }}">
                    </div>
                    <div class="col-12">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">DESCRIPTION</label>
                        <textarea name="description" class="cyber-inp" rows="3" style="resize:vertical;">{{ item.description }}</textarea>
                    </div>
                    <div class="col-md-6">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">CATEGORY</label>
                        <select name="category_id" class="cyber-sel">
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if cat.id == item.category_id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">NEW FILE (optional)</label>
                        <input type="file" name="file" class="cyber-inp" style="padding:0.4rem 1rem;">
                        {% if item.filename %}<div style="font-size:0.65rem;color:var(--muted);margin-top:4px;">Current: {{ item.original_filename }}</div>{% endif %}
                    </div>
                    <div class="col-md-6">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">IMAGE URL</label>
                        <input type="url" name="image_url" class="cyber-inp" value="{{ item.image_url or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label style="font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:0.3rem;">EXTERNAL URL</label>
                        <input type="url" name="file_url" class="cyber-inp" value="{{ item.file_url or '' }}">
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn-a"><i class="fas fa-save"></i> Save</button>
                        <a href="{{ url_for('admin_downloads') }}" class="btn-ao">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
